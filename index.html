<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>تاوريرت الذكية | دليل الصيدليات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar بسيط -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2><i class="fas fa-city"></i> تاوريرت <span>الذكية</span></h2>
        <p>دليل الصيدليات - بالدارجة</p>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" id="pharmacyTabBtn">
          <i class="fas fa-prescription-bottle"></i> <span>الصيدليات</span>
        </button>
        <!-- سيتم إضافة وحدات أخرى لاحقاً -->
      </nav>
      <div class="sidebar-footer">
        <button id="voiceAssistBtn" class="voice-btn"><i class="fas fa-microphone-alt"></i> المساعد الصوتي</button>
        <button id="themeToggle" class="theme-btn"><i class="fas fa-moon"></i> الوضع المظلم</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="stats-header">
        <div class="stat-box"><i class="fas fa-prescription-bottle"></i><span id="totalPharmacies">0</span><label>صيدلية</label></div>
        <div class="stat-box duty"><i class="fas fa-clock"></i><span id="openNow">0</span><label>مفتوحة الآن</label></div>
      </div>

      <div class="map-controls">
        <button id="locateMeBtn" class="locate-btn"><i class="fas fa-location-dot"></i> موقعي</button>
        <button id="nearestPharmacyBtn" class="route-btn"><i class="fas fa-route"></i> أقرب صيدلية</button>
      </div>

      <div id="map" class="pharmacy-map"></div>

      <div class="pharmacy-list-header">
        <h3><i class="fas fa-list"></i> قائمة الصيدليات</h3>
        <input type="text" id="searchPharmacy" placeholder="🔍 بحث بالاسم أو الحي..." class="search-input">
      </div>
      <div id="pharmaciesList" class="pharmacies-list"></div>
    </main>
  </div>

  <!-- الصوتيات -->
  <audio id="voiceAudio" style="display:none"></audio>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
