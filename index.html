<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>تاوريرت الذكية | تاوريرت الذكية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dark-mode.css" id="dark-mode-styles">
  <style>
    /* تعديلات صغيرة لجعل المحتوى فوق الخلفية */
    .sidebar, .main-content { background: transparent !important; }
    .sidebar { backdrop-filter: blur(12px); background: rgba(15, 43, 61, 0.7) !important; }
    .main-content .stats-grid, .main-content .content-header, .tab-content { backdrop-filter: blur(4px); }
    .stat-card, .pharmacy-card, .realestate-card, .job-card, .report-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); }
    body.dark .stat-card, body.dark .pharmacy-card, body.dark .realestate-card, body.dark .job-card, body.dark .report-card { background: rgba(30,41,59,0.85); }
    body.dark .sidebar { background: rgba(10,15,30,0.8) !important; }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">... نفس المحتوى السابق ...</aside>
    <main class="main-content">... نفس المحتوى السابق ...</main>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
