<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TAOURIRT HUB | دليل الصيدليات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header الرئيسي -->
  <header class="main-header">
    <h1>TAOURIRT <span>HUB</span></h1>
    <p>دليل مدينة تاوريرت - خدمات صحية وتجارية</p>
    <div class="header-stats">
      <div class="stat">
        <span id="totalPharmacies">0</span>
        <label>صيدلية</label>
      </div>
      <div class="stat">
        <span id="openNowCount">0</span>
        <label>مفتوحة الآن</label>
      </div>
      <div class="stat">
        <span id="usersCount">+1K</span>
        <label>زائر</label>
      </div>
    </div>
  </header>

  <!-- أزرار الإجراءات السريعة -->
  <div class="quick-actions">
    <button id="bloodBtn"><i class="fas fa-tint"></i> التبرع بالدم <span>0</span></button>
    <button id="lostBtn"><i class="fas fa-search"></i> المفقودات <span>0</span></button>
    <button id="jobsBtn"><i class="fas fa-briefcase"></i> وظائف <span>3</span></button>
  </div>

  <!-- الخريطة -->
  <div class="map-container">
    <div id="map" class="pharmacy-map"></div>
  </div>

  <!-- شريط البحث والفلاتر -->
  <div class="search-section">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="بحث بالاسم أو الحي...">
    </div>
    <div class="neighborhood-filters" id="neighborhoodFilters"></div>
  </div>

  <!-- قائمة الصيدليات -->
  <div class="pharmacy-list-header">
    <h3><i class="fas fa-list"></i> الصيدليات</h3>
    <span id="resultCount">0</span>
  </div>
  <div id="pharmaciesList" class="pharmacies-list"></div>

  <!-- أيقونة المساعد الذكي -->
  <button id="voiceAssistant" class="voice-assistant">
    <i class="fas fa-microphone-alt"></i>
    <span class="pulse-ring"></span>
  </button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
