<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>تاوريرت الذكية | Taourirt Smart City</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dark-mode.css" id="dark-mode-styles">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>🏙️ تاوريرت <span>الذكية</span></h2>
        <p>مدينة متصلة</p>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-tab="pharmacies">
          <i class="fas fa-prescription-bottle"></i> الصيدليات
        </button>
        <button class="nav-btn" data-tab="realestate">
          <i class="fas fa-building"></i> العقارات
        </button>
        <button class="nav-btn" data-tab="jobs">
          <i class="fas fa-briefcase"></i> الوظائف
        </button>
        <button class="nav-btn" data-tab="reports">
          <i class="fas fa-flag"></i> التبليغات
        </button>
      </nav>
      <div class="sidebar-footer">
        <button id="theme-toggle-sidebar" class="theme-btn">
          <i class="fas fa-moon"></i> الوضع المظلم
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="stats-grid">
        <div class="stat-card" data-stat="pharmacies">
          <i class="fas fa-prescription-bottle"></i>
          <div class="stat-info">
            <span class="stat-number" id="stat-pharmacies">0</span>
            <span class="stat-label">صيدلية</span>
          </div>
        </div>
        <div class="stat-card" data-stat="realestate">
          <i class="fas fa-building"></i>
          <div class="stat-info">
            <span class="stat-number" id="stat-realestate">0</span>
            <span class="stat-label">عقار</span>
          </div>
        </div>
        <div class="stat-card" data-stat="jobs">
          <i class="fas fa-briefcase"></i>
          <div class="stat-info">
            <span class="stat-number" id="stat-jobs">0</span>
            <span class="stat-label">وظيفة</span>
          </div>
        </div>
        <div class="stat-card" data-stat="reports">
          <i class="fas fa-flag"></i>
          <div class="stat-info">
            <span class="stat-number" id="stat-reports">0</span>
            <span class="stat-label">بلاغ</span>
          </div>
        </div>
      </div>

      <div class="content-header">
        <h2 id="current-tab-title">الصيدليات</h2>
        <button id="add-btn-main" class="add-main-btn">
          <i class="fas fa-plus"></i> إضافة جديدة
        </button>
      </div>

      <div id="pharmacies-container" class="tab-content active"></div>
      <div id="realestate-container" class="tab-content"></div>
      <div id="jobs-container" class="tab-content"></div>
      <div id="reports-container" class="tab-content"></div>
    </main>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
